<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마이파이</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- PWA -->
  <link rel="manifest" href="../manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="마이파이">
  <meta name="theme-color" content="#4caf50">
  <link rel="apple-touch-icon" href="../images/icons/apple-touch-icon.png">
  <link rel="icon" href="../images/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/icons/favicon-32x32.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    .messenger-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #f4f6fb;
    }
    .messenger-topbar {
      height: 50px; /* 기존 72px 대비 약 -30% */
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      box-shadow: 0 1px 0 rgba(15,23,42,0.04);
      position: relative;
      z-index: 2;
    }
    .messenger-topbar-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .messenger-topbar-logo:active { opacity: 0.88; }
    .messenger-topbar-logo img {
      height: 68px; /* 로고만 더 크게 (상단바 높이는 유지) */
      max-height: 100%;
      width: auto;
    }
    .messenger-topbar-close {
      position: absolute;
      right: 54px;   /* 프로필 버튼(32px) + 여백(10px) + 자체여백(12px) */
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: rgba(0,0,0,0.12);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      color: #fff;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s;
    }
    .messenger-topbar-close:active {
      background: rgba(0,0,0,0.28);
    }
/* ===== 상단바: 현재 대화방 버튼(왼쪽) ===== */
    .messenger-topbar-roombtn{
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      max-width: min(44vw, 260px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

      display: inline-flex;
      align-items: center;
      gap: 6px;

      border: 1px solid rgba(0,0,0,0.10);
      background: #f3f4f6;
      color: #111827;
      border-radius: 12px; /* 각이 조금 둥근 네모 */
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .messenger-topbar-roombtn::after{
      content: "▾";
      font-size: 12px;
      opacity: 0.7;
      flex: 0 0 auto;
    }
    .messenger-topbar-roombtn:active{
      background: #e5e7eb;
    }

    /* ===== 대화방 패널 열림 시 뒤 배경(클릭하면 닫힘) ===== */
    .room-backdrop{
      position: fixed;
      left: 0;
      right: 0;
      top: 50px; /* topbar 높이 */
      bottom: 0;
      background: rgba(15,23,42,0.18);
      display: none;
      z-index: 45;
    }
    .room-backdrop.open{ display:block; }
.messenger-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 8px;
      background: linear-gradient(to bottom, #f4f6fb, #e6ecff);
    }
    .date-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0;
      font-size: 11px;
      color: #9ca3af;
    }
    .date-separator::before,
    .date-separator::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(148,163,184,0.5);
      margin: 0 6px;
    }
    .date-separator span {
      white-space: nowrap;
    }
    .msg-row {
      width: 100%;
      margin: 4px 0;
      display: flex;
    }
    .msg-row.me {
      justify-content: flex-end;
    }
    .msg-row.other {
      justify-content: flex-start;
    }
    /* msg-inner, msg-avatar, msg-content-wrap 등은 하단 카톡 스타일 CSS 참고 */
    .bubble {
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      word-break: break-word;
      background: #e5e7eb;
      color: #111827;
    }
    /* 사진 메시지 버블 */
    .bubble.photo-bubble {
      padding: 6px;
      background: #ffffff;
    }
    .msg-row.me .bubble.photo-bubble {
      background: rgba(37, 99, 235, 0.10);
    }
    .chat-photo {
      display: block;
      width: 180px;
      max-width: min(56vw, 240px);
      height: auto;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(15,23,42,0.12);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .bubble.emoji-only {
      background: transparent !important;
      padding: 0 !important;
      border-radius: 0 !important;
    }
    .msg-row.me .bubble.emoji-only,
    .msg-row.other .bubble.emoji-only {
      background: transparent !important;
    }
    .msg-row.me .bubble {
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .bubble {
      background: #ffffff;
      color: #111827;
      border-bottom-left-radius: 4px;
    }
    /* msg-meta 는 하단 카톡 스타일 CSS에서 재정의 */
    .empty-hint {
      margin-top: 24px;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
    .messenger-input-bar {
      padding: 8px 10px 12px;
      background: #f9fafb;
      box-shadow: 0 -1px 0 rgba(15,23,42,0.04);
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 2;
    }
    .msg-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #e5edff;
      gap: 6px;
    }
    .msg-emoji-btn {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: rgba(148,163,184,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }
    .msg-camera-btn {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: rgba(148,163,184,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }
    .msg-emoji-btn:active {
      background: rgba(148,163,184,0.5);
    }
    .msg-camera-btn:active {
      background: rgba(148,163,184,0.5);
    }

    /* =========================================================
       [+ 첨부 메뉴]
       - + 버튼을 누르면(사진촬영/이미지/파일) 3개 메뉴를 표시
       - social-messenger.js 가 DOM을 생성하고, 여기 CSS가 모양을 담당
       ========================================================= */
    .msg-attach-menu{
      position:absolute;
      left: 46px; /* 😊 버튼 + 여백 기준(대략) */
      bottom: 52px;
      width: 160px;
      background:#ffffff;
      border: 1px solid rgba(148,163,184,0.45);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.18);
      padding: 6px;
      display:none;
      z-index: 25;
    }
    .msg-attach-menu.open{ display:block; }
    .msg-attach-item{
      width:100%;
      border:0;
      background:transparent;
      padding: 10px 10px;
      text-align:left;
      font-size: 13px;
      color:#111827;
      border-radius: 12px;
      cursor:pointer;
    }
    .msg-attach-item:active{
      background: rgba(37,99,235,0.10);
    }

    /* 파일 메시지(링크) */
    .file-bubble{
      background:#ffffff;
      color:#111827;
    }
    .msg-row.me .file-bubble{
      background: rgba(37, 99, 235, 0.10);
      color:#111827;
    }
    .file-link{
      color: inherit;
      text-decoration: underline;
      word-break: break-all;
    }
    .msg-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #111827;
    }
    .msg-input::placeholder {
      color: #9ca3af;
    }
    .send-btn {
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      padding: 0 20px;
      height: 36px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.35);
    }
    .send-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(37, 99, 235, 0.35);
    }
    
.msg-emoji-panel {
  position: absolute;
  left: 10px;
  bottom: 60px;

  /* 실시간 톡 보기 화면(라이트 톤)에 맞춘 이모티콘 패널 */
  width: 340px;
  max-width: min(340px, 92vw);
  background: rgba(244,246,251,0.98);
  border-radius: 16px;
  border: 1px solid rgba(148,163,184,0.45);
  box-shadow: 0 16px 40px rgba(15,23,42,0.22);

  /* 좌/우 동일 여백 확보 */
  padding: 10px;
  display: none;
  z-index: 20;

  /* 화면이 작은 환경에서 잘리지 않도록 */
  max-height: min(320px, calc(100vh - 160px));
  overflow: auto;
}
.msg-emoji-panel.open {
  display: block;
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  justify-content: stretch;
}
.emoji-item {
  width: 100%;
  aspect-ratio: 1 / 1;
  height: auto;
  border-radius: 12px;
  border: none;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.emoji-item:active {
  background: rgba(37,99,235,0.14);
}
.chat-emoji {
  width: 100%;
  height: 100%;
  max-width: 72px;
  max-height: 72px;
  object-fit: contain;
  pointer-events: none;
}
    .msg-status {
      position: absolute;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.86);
      color: #f9fafb;
      font-size: 11px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease-out;
      z-index: 30;
    }
    .msg-status.show {
      opacity: 1;
    }

    /* =========================================================
       [이미지 확대 보기]
       - 채팅 메시지 내 img.chat-photo 또는 [data-zoomable="1"] 클릭 시
         전체 화면으로 확대
       - 다시 누르면(오버레이 클릭) 원래대로
       ========================================================= */
    body.no-scroll {
      overflow: hidden;
    }
    .img-zoom-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.86);
      z-index: 9999;
      -webkit-tap-highlight-color: transparent;
    }
    .img-zoom-overlay.open {
      display: flex;
    }
    .img-zoom-overlay img {
      max-width: 92vw;
      max-height: 92vh;
      width: auto;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
  
    /* ===== 대화방 ===== */
    .messenger-main {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    /* ══════════════════════════════════════════════════════
       대화방 패널 레이아웃
       - PC  : 오버레이(버튼 눌러야 열림, 기존 방식)
       - 모바일 : 전체화면 슬라이드
    ══════════════════════════════════════════════════════ */

    /* 공통 기본값: flex layout에서 제거, 오버레이 방식 */
    .room-panel {
      position: fixed;
      left: 0;
      top: 50px;
      bottom: 0;
      width: 300px;
      max-width: 86vw;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid rgba(0,0,0,0.08);
      transform: translateX(-110%);
      transition: transform 0.22s cubic-bezier(.4,0,.2,1);
      box-shadow: 8px 0 32px rgba(15,23,42,0.15);
      z-index: 50;
    }
    .room-panel.open {
      transform: translateX(0);
    }

    /* backdrop: 패널 뒤 어두운 배경 */
    .room-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.28);
      z-index: 49;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .room-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* topbar 방 버튼: 항상 표시 */
    .messenger-topbar-roombtn { display: flex !important; }

    /* chat-panel: 항상 전체 너비 */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    /* 모바일: 패널 전체화면 */
    @media (max-width: 600px) {
      .room-panel {
        width: 100vw;
        max-width: 100vw;
        box-shadow: none;
      }
    }
    .room-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      background: #f8fafc;
    }
    .room-panel-title {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.3px;
    }
    .room-add-btn {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #f3f4f6;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .room-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }
    /* 카톡 스타일 방 아이템 */
    .room-item {
      width: 100%;
      text-align: left;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      background: transparent;
      border-radius: 0;
      padding: 11px 14px 11px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .room-item:active,
    .room-item:hover { background: rgba(37,99,235,0.06); }
    .room-item.active {
      background: rgba(37,99,235,0.10);
      border-left: 3px solid #2563eb;
      padding-left: 9px;
    }
    .room-item-info {
      flex: 1;
      min-width: 0;
    }
    .room-name {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-meta {
      margin-top: 2px;
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* 미확인 배지 */
    .room-item { position: relative; padding-right: 30px; }
    .room-unread-badge {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .room-unread-badge.show { display: flex; }

    /* ── 방 아이콘 프로필 그리드 (카톡 스타일) ── */
    .room-item-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366f1 0%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
      overflow: hidden;
      position: relative;
    }
    .room-item.active .room-item-icon {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }
    /* 1명: 꽉 채움 */
    .room-icon-grid-1 { padding: 0; }
    .room-icon-grid-1 .room-icon-avatar {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    /* 2명: 세로 반반 */
    .room-icon-grid-2 {
      flex-direction: row;
      gap: 1px;
      background: #e5e7eb;
      padding: 0;
    }
    .room-icon-grid-2 .room-icon-avatar {
      width: 50%; height: 100%;
      object-fit: cover;
    }
    /* 3~4명: 2x2 그리드 */
    .room-icon-grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: #e5e7eb;
      padding: 0;
    }
    .room-icon-grid-4 .room-icon-avatar {
      width: 100%; height: 100%;
      object-fit: cover;
    }

  
    /* =========================================================
       [채팅 링크/유튜브 미리보기/QR 스캔]
       ========================================================= */
    .msg-link{
      color:#2563eb;
      text-decoration: underline;
      word-break: break-all;
    }
    .msg-link:active{ opacity: 0.8; }

    .yt-preview{
      display:flex;
      gap:10px;
      margin-top:8px;
      padding:8px;
      border:1px solid rgba(148,163,184,0.45);
      border-radius:12px;
      background:#ffffff;
      text-decoration:none;
      color:inherit;
    }
    .msg-row.me .yt-preview{
      background: rgba(37, 99, 235, 0.06);
    }
    .yt-thumb{
      width:96px;
      height:54px;
      object-fit:cover;
      border-radius:10px;
      flex:0 0 auto;
      background:#e5e7eb;
    }
    .yt-info{
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }
    .yt-title{
      font-size:13px;
      font-weight:700;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .yt-host{
      font-size:12px;
      color:#6b7280;
      margin-top:4px;
    }

    .qr-scan-overlay{
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }
    .qr-scan-overlay.open{ display:flex; }
    .qr-scan-box{
      width: min(360px, 100%);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15,23,42,0.25);
      overflow: hidden;
    }
    .qr-scan-header{
      padding: 12px 14px;
      font-weight: 800;
      border-bottom: 1px solid rgba(148,163,184,0.35);
    }
    .qr-scan-video{
      width: 100%;
      height: 260px;
      background: #0b1220;
      object-fit: cover;
    }
    .qr-scan-hint{
      padding: 10px 14px;
      font-size: 13px;
      color: #334155;
    }
    .qr-scan-cancel{
      width: calc(100% - 28px);
      margin: 0 14px 14px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: rgba(37,99,235,0.12);

  <!-- ── 캐릭터에게 물어보기 패치 ──────────────────────────────
       @미나, 미나야 등으로 시작하면 캐릭터가 인라인으로 응답.
       부모 창과 postMessage(WG_CORE_BRIDGE_REQUEST)로 통신하여
       file:// 환경에서도 cross-origin 없이 동작.
       내 질문도 채팅창에 표시 후 캐릭터 응답 추가.
  ──────────────────────────────────────────────────────────── -->
  <script>
  (function () {

    /* ── postMessage 브릿지 ── */
    var _pendingBridge = {};
    window.addEventListener('message', function (ev) {
      var d = ev && ev.data;
      if (!d || d.type !== 'WG_CORE_BRIDGE_RESPONSE') return;
      var cb = _pendingBridge[d.requestId];
      if (!cb) return;
      delete _pendingBridge[d.requestId];
      if (d.ok) cb.resolve(d.result);
      else cb.reject(new Error(d.error || 'bridge error'));
    });

    function bridgeCall(method, args) {
      return new Promise(function (resolve, reject) {
        var id = 'br_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        _pendingBridge[id] = { resolve: resolve, reject: reject };
        setTimeout(function () {
          if (_pendingBridge[id]) {
            delete _pendingBridge[id];
            reject(new Error('timeout'));
          }
        }, 5000);
        try {
          window.parent.postMessage({
            type: 'WG_CORE_BRIDGE_REQUEST',
            requestId: id,
            method: method,
            args: args || []
          }, '*');
        } catch (e) { reject(e); }
      });
    }

    /* ── 현재 캐릭터 이름/별칭 ── */
    var _cachedCharName = null;
    function getCharName() {
      // 직접 접근 먼저 시도 (같은 origin)
      try {
        if (window.parent && window.parent.GhostCoreBridge &&
            typeof window.parent.GhostCoreBridge.getCurrentCharacterName === 'function') {
          _cachedCharName = window.parent.GhostCoreBridge.getCurrentCharacterName() || '미나';
          return _cachedCharName;
        }
      } catch (e) {}
      return _cachedCharName || '미나';
    }

    function getAliases(name) {
      if (name === '미나') return ['미나', '민아', '민하'];
      if (name === '민수') return ['민수'];
      return [name];
    }

    /* ── 캐릭터 호출 감지 ── */
    function extractGhostQuery(text) {
      var t = (text || '').trim();
      var name = getCharName();
      var aliases = getAliases(name);
      for (var i = 0; i < aliases.length; i++) {
        var n = aliases[i];
        var re = new RegExp('^[@]?' + n + '[야아:,!~ ]+', 'i');
        if (re.test(t)) return t.replace(re, '').trim() || t;
        if (t === '@' + n || t === n + '야' || t === n + '아' || t === n) return t;
      }
      return null;
    }

    /* ── 내 질문 채팅창에 표시 (로컬 렌더, 시트 전송 없음) ── */
    function showMyQuery(text) {
      try {
        var body = document.getElementById('messengerBody');
        if (!body) return;
        var row = document.createElement('div');
        row.className = 'msg-row me ghost-ask-row';
        var inner = document.createElement('div');
        inner.className = 'msg-inner';
        var contentWrap = document.createElement('div');
        contentWrap.style.cssText = 'display:flex;flex-direction:column;gap:2px;align-items:flex-end;';
        var bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.style.cssText = 'background:#e9d5ff;color:#3b0764;';
        bubble.textContent = text;
        contentWrap.appendChild(bubble);
        inner.appendChild(contentWrap);
        row.appendChild(inner);
        body.appendChild(row);
        body.scrollTop = body.scrollHeight;
      } catch (e) {}
    }

    /* ── 캐릭터 응답 채팅창에 표시 ── */
    function showInlineGhostMsg(charName, line, faceImg) {
      try {
        var body = document.getElementById('messengerBody');
        if (!body) return;
        var DEFAULT_SVG = "data:image/svg+xml," + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">' +
          '<circle cx="20" cy="20" r="20" fill="#c7d2fe"/>' +
          '<circle cx="20" cy="15" r="7" fill="#818cf8"/>' +
          '<ellipse cx="20" cy="34" rx="12" ry="9" fill="#818cf8"/></svg>');

        var row = document.createElement('div');
        row.className = 'msg-row other ghost-ask-row';
        var inner = document.createElement('div');
        inner.className = 'msg-inner';

        // 아바타
        var avatarWrap = document.createElement('div');
        avatarWrap.style.cssText = 'flex:0 0 auto;width:36px;margin-right:6px;align-self:flex-start;';
        var avatarImg = document.createElement('img');
        avatarImg.className = 'msg-avatar';
        avatarImg.alt = charName;
        avatarImg.src = faceImg || DEFAULT_SVG;
        avatarImg.style.cssText = 'width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:top;background:#e0e7ff;display:block;border:2px solid rgba(129,140,248,0.4);';
        avatarImg.onerror = function () { this.onerror = null; this.src = DEFAULT_SVG; };
        avatarWrap.appendChild(avatarImg);
        inner.appendChild(avatarWrap);

        // 콘텐츠
        var contentWrap = document.createElement('div');
        contentWrap.style.cssText = 'display:flex;flex-direction:column;gap:2px;align-items:flex-start;';
        var nameEl = document.createElement('div');
        nameEl.className = 'msg-sender-name';
        nameEl.style.cssText = 'font-size:11px;font-weight:700;color:#6366f1;padding-left:4px;margin-bottom:1px;';
        nameEl.textContent = charName;
        var bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.style.cssText = 'background:linear-gradient(135deg,#e0e7ff,#f0f4ff);color:#1e293b;border:1px solid rgba(129,140,248,0.25);';
        bubble.textContent = line;
        contentWrap.appendChild(nameEl);
        contentWrap.appendChild(bubble);
        inner.appendChild(contentWrap);
        row.appendChild(inner);
        body.appendChild(row);
        body.scrollTop = body.scrollHeight;
      } catch (e) {}
    }

    /* ── 이벤트 가로채기 ── */
    function patchSend() {
      var input   = document.getElementById('msgInput');
      var sendBtn = document.getElementById('msgSendBtn');
      if (!input) return;

      function handleGhostAsk() {
        var text  = (input.value || '').trim();
        if (!text) return false;
        var query = extractGhostQuery(text);
        if (query === null) return false;

        input.value = '';
        var charName = getCharName();

        // 1) 내 질문 채팅창에 표시
        showMyQuery(text);

        // 2) postMessage 로 응답 요청
        var faceImg = null;

        // 캐릭터 얼굴 이미지 먼저 가져온 뒤 응답
        bridgeCall('getCurrentCharacterFaceImg', [])
          .catch(function () { return null; })
          .then(function (src) {
            if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('../')) {
              src = '../' + src;
            }
            faceImg = src;
            return bridgeCall('getUnifiedCharacterChatResponse', [query, { allowCharacterCall: true }]);
          })
          .then(function (resp) {
            var line = (resp && resp.line) ? resp.line : '응, 말해봐!';
            showInlineGhostMsg(charName, line, faceImg);
          })
          .catch(function (err) {
            // postMessage 실패 시 직접 접근 시도 (같은 origin)
            try {
              if (window.parent && window.parent.GhostCoreBridge &&
                  typeof window.parent.GhostCoreBridge.getUnifiedCharacterChatResponse === 'function') {
                window.parent.GhostCoreBridge
                  .getUnifiedCharacterChatResponse(query, { allowCharacterCall: true })
                  .then(function (resp) {
                    var line = (resp && resp.line) ? resp.line : '응, 말해봐!';
                    showInlineGhostMsg(charName, line, faceImg);
                  })
                  .catch(function () {
                    showInlineGhostMsg(charName, '잘 못 들었어. 다시 말해줄래?', faceImg);
                  });
              } else {
                showInlineGhostMsg(charName, '잘 못 들었어. 다시 말해줄래?', faceImg);
              }
            } catch (e2) {
              showInlineGhostMsg(charName, '잘 못 들었어. 다시 말해줄래?', faceImg);
            }
          });

        return true;
      }

      input.addEventListener('keydown', function (ev) {
        if (ev.key !== 'Enter' || ev.shiftKey) return;
        if (!handleGhostAsk()) return;
        ev.preventDefault();
        ev.stopImmediatePropagation();
      }, true);

      if (sendBtn) {
        sendBtn.addEventListener('click', function (ev) {
          if (!handleGhostAsk()) return;
          ev.preventDefault();
          ev.stopImmediatePropagation();
        }, true);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', patchSend);
    } else {
      setTimeout(patchSend, 100);
    }
  })();
  </script>
